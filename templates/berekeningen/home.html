<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brutomarge calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f4f7fb;
            color: #1f2937;
        }

        .card {
            max-width: 720px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        .form-grid {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 12px 18px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 10px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .result {
            background: #dcfce7;
            color: #14532d;
        }

        .muted {
            color: #6b7280;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Brutomarge calculator</h1>
        <p class="muted">Voer <strong>omzet</strong> en <strong>inkoopkosten</strong> in om de brutomarge en het margepercentage te berekenen.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-grid">
                <div>
                    <label for="omzet">Omzet</label>
                    <input type="number" step="0.01" min="0" id="omzet" name="omzet" value="{{ omzet }}" placeholder="Bijv. 12500">
                </div>

                <div>
                    <label for="inkoopkosten">Inkoopkosten</label>
                    <input type="number" step="0.01" min="0" id="inkoopkosten" name="inkoopkosten" value="{{ inkoopkosten }}" placeholder="Bijv. 8300">
                </div>

                <div>
                    <button type="submit">Bereken</button>
                </div>
            </div>
        </form>

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        {% if show_results %}
            <div class="message result">
                <p><strong>Brutomarge:</strong> € {{ brutomarge }}</p>
                <p><strong>Margepercentage:</strong> {{ margepercentage }}%</p>
            </div>
        {% endif %}
    </main>
</body>
</html>
